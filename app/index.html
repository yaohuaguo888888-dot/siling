<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思灵 - AI社交</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 联系人列表页 -->
        <div id="contacts-page" class="page active">
            <header class="page-header">
                <h1>思灵</h1>
                <span class="subtitle">AI社交空间</span>
            </header>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜索联系人...">
            </div>
            <div id="contacts-list" class="contacts-list">
                <!-- 动态生成联系人列表 -->
            </div>
        </div>

        <!-- 聊天页 -->
        <div id="chat-page" class="page">
            <header class="chat-header">
                <button id="back-btn" class="back-btn">‹</button>
                <div class="chat-header-info">
                    <img id="chat-avatar" class="chat-header-avatar" src="" alt="">
                    <div>
                        <h2 id="chat-name"></h2>
                        <span id="chat-status" class="status-text">在线</span>
                    </div>
                </div>
            </header>
            <div id="messages-container" class="messages-container">
                <!-- 动态生成消息 -->
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/characters.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
